name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (build + guard + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Reproducible install from the committed lockfile.
      - run: npm ci
      - run: npm run build:solo
      - run: npm run test:build   # static import-graph guard
      - run: npm run test:js      # unit + integration tests

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Fail only on high/critical advisories in JS deps.
      - run: npm audit --audit-level=high
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      # Scan both Rust lockfiles (desktop app + sync service).
      - run: cargo audit --file src-tauri/Cargo.lock
      - run: cargo audit --file server/Cargo.lock

  server:
    name: server (tahlk-sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo build --manifest-path server/Cargo.toml --locked

  desktop:
    name: desktop (src-tauri check)
    # Pinned to 22.04 because libwebkit2gtk-4.1-dev is straightforward here;
    # 24.04 needs extra steps for that package.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 Linux system deps (WebKitGTK 4.1, appindicator, rsvg).
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            file \
            wget

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Build the web frontend so frontendDist (../dist-solo) exists for
      # tauri-build validation.
      - run: npm ci
      - run: npm run build:solo

      # tauri-build validates externalBin AND resources paths on every
      # cargo invocation (not only at bundle time), regardless of target.
      # The real whisper.cpp sidecar, model, and Windows DLLs are gitignored
      # and placed manually for local builds. In CI we drop zero-byte
      # placeholders so build.rs is satisfied. `cargo check` never reads
      # them; only the tauri bundler would, and bundling stays manual
      # until the DLL-bundling decision lands.
      - name: Stub whisper sidecar + resources for CI
        run: |
          mkdir -p src-tauri/binaries src-tauri/resources
          # externalBin: needs the target-triple suffix.
          touch src-tauri/binaries/whisper-cpp-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/whisper-cpp-x86_64-unknown-linux-gnu
          # resources map from tauri.conf.json.
          touch src-tauri/resources/ggml-base.en.bin
          for dll in whisper.dll ggml.dll ggml-base.dll \
                     ggml-cpu-alderlake.dll ggml-cpu-cannonlake.dll \
                     ggml-cpu-cascadelake.dll ggml-cpu-haswell.dll \
                     ggml-cpu-icelake.dll ggml-cpu-sandybridge.dll \
                     ggml-cpu-skylakex.dll ggml-cpu-sse42.dll \
                     ggml-cpu-x64.dll; do
            touch "src-tauri/binaries/$dll"
          done

      - run: cargo check --manifest-path src-tauri/Cargo.toml --locked --all-targets
